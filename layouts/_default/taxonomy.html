{{ define "main" }}
<main>
  <h3>{{ .Title }}</h3>

  <ul>
    {{ range .Pages }}
    <li>
      <span class="ul.blog-posts">{{ .Date.Format "Jan 2, 2006" }}</span>
      <a class="ul.blog-posts" href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ else }}
    <li>No se encontraron entradas con este tag.</li>
    {{ end }}
  </ul>
</main>
{{ end }}
